services:
  - type: web
    name: mini-erp
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn wsgi:app
    envVars:
      - key: FLASK_ENV
        value: production
      - key: DATABASE_URL
        sync: false  # Will be provided via Neon PostgreSQL dashboard
      - key: SECRET_KEY
        generateValue: true
