services:
  - type: web
    name: mini-erp
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.12
      - key: FLASK_ENV
        value: production
      - key: DATABASE_URL
        sync: false  # Will be provided via Neon PostgreSQL dashboard
      - key: SECRET_KEY
        generateValue: true
