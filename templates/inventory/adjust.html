{% extends 'base.html' %}

{% block title %}Manual Stock Adjustment — Mini ERP{% endblock %}
{% block page_title %}Manual Stock Adjustment{% endblock %}

{% block content %}
<div class="card" style="max-width: 600px; margin: 0 auto;">
  <div class="card-header">
    <h3>Adjust Stock Levels</h3>
  </div>
  
  <div style="padding: 1.5rem;">
    <form method="POST" action="{{ url_for('inventory.adjust') }}">
      
      <div class="form-group">
        <label class="form-label" for="product_id">Product *</label>
        <select id="product_id" name="product_id" class="form-control" required>
          <option value="">-- Select Product --</option>
          {% for p in products %}
          <option value="{{ p.id }}">{{ p.name }} (Current On-Hand: {{ p.on_hand_qty }})</option>
          {% endfor %}
        </select>
      </div>

      <div class="form-group mt-3">
        <label class="form-label" for="qty_change">Quantity Change *</label>
        <p class="text-muted" style="margin-top:0; margin-bottom: 0.5rem; font-size: 0.85em;">Use negative values to decrease stock, positive to increase.</p>
        <input type="number" id="qty_change" name="qty_change" class="form-control" step="0.01" value="0" required>
      </div>

      <div class="form-group mt-3">
        <label class="form-label" for="reason">Reason for Adjustment</label>
        <input type="text" id="reason" name="reason" class="form-control" placeholder="e.g. Damage, Count mismatch, Found inventory">
      </div>

      <div class="btn-group" style="margin-top: 2.5rem;">
        <a href="{{ url_for('inventory.stock_levels') }}" class="btn btn-secondary">Cancel</a>
        <button type="submit" class="btn btn-primary" onclick="return confirm('Are you sure you want to adjust the stock for this product?');">Submit Adjustment</button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
